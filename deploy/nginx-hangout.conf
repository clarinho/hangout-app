# Replace chat.example.com with your domain.
# If you do not have a domain yet, use the droplet IP for testing, but auto-update and login security
# should use HTTPS before you share installers widely.

server {
    listen 80;
    server_name chat.example.com;

    # Certbot can replace this server block with HTTPS redirects:
    # sudo certbot --nginx -d chat.example.com

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Put electron-builder update artifacts here:
    # /var/www/hangout-updates/latest.yml
    # /var/www/hangout-updates/Hangout Setup 0.1.0.exe
    # /var/www/hangout-updates/*.blockmap
    location /updates/ {
        alias /var/www/hangout-updates/;
        autoindex off;
        add_header Cache-Control "no-cache";
    }
}
